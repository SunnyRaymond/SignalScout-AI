      <text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="386" y="337">Cloud engineers and SRE</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="386" y="361">roles point to reliability,</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="386" y="385">modernization, and platform</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="386" y="409">operations projects.</text></g>
