      <text font-size="15" text-anchor="middle" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="860" y="370">Grounded opening</text><text font-size="15" text-anchor="middle" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="860" y="392">line and pain</text><path fill="#10B981" fill-opacity="0.10" d="M804,424 H916 A14,14 0 0 1 930,438 V438 A14,14 0 0 1 916,452 H804 A14,14 0 0 1 790,438 V438 A14,14 0 0 1 804,424 Z" />
      <text x="860" y="443" text-anchor="middle" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#0F172A">OUTPUT: EMAIL</text>
