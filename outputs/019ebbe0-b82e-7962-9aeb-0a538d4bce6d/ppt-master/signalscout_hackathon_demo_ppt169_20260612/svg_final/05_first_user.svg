      <text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="96" y="337">RevOps and BI roles</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="96" y="361">signal reporting pain,</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="96" y="385">dashboard backlog, and</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="96" y="409">pipeline visibility needs.</text></g>
