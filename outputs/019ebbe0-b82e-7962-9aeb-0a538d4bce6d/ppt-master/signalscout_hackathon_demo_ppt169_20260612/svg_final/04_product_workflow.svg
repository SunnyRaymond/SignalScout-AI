      <text font-size="15" text-anchor="middle" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="1088" y="370">Morning team</text><text font-size="15" text-anchor="middle" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="1088" y="392">handoff</text><path fill="#10B981" fill-opacity="0.10" d="M1038,424 H1138 A14,14 0 0 1 1152,438 V438 A14,14 0 0 1 1138,452 H1038 A14,14 0 0 1 1024,438 V438 A14,14 0 0 1 1038,424 Z" />
