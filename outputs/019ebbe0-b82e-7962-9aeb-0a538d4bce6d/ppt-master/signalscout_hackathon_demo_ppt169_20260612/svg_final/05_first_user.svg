      <text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="676" y="337">Security, compliance, and</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="676" y="361">IAM hiring can reveal access,</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="676" y="385">risk readiness, and audit</text><text font-size="16" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="676" y="409">pressure before RFPs appear.</text></g>
