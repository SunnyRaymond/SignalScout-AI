      <text font-size="15" text-anchor="middle" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="632" y="370">Relevance, urgency,</text><text font-size="15" text-anchor="middle" fill="#475569" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="632" y="392">and confidence</text><path fill="#10B981" d="M582,424 H682 A14,14 0 0 1 696,438 V438 A14,14 0 0 1 682,452 H582 A14,14 0 0 1 568,438 V438 A14,14 0 0 1 582,424 Z" />
      <text x="632" y="443" text-anchor="middle" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF">OUTPUT: RANK</text>
