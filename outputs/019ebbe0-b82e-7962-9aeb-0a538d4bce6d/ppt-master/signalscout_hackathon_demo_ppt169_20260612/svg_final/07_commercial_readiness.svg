<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#F8FAFC" />
  <g id="header">
    <path fill="#FFFFFF" stroke="#E2E8F0" d="M70,40 H196 A14,14 0 0 1 210,54 V54 A14,14 0 0 1 196,68 H70 A14,14 0 0 1 56,54 V54 A14,14 0 0 1 70,40 Z" />
    <text x="133" y="60" text-anchor="middle" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="12" font-weight="800" fill="#475569">COMMERCIAL READY</text>
    <text x="56" y="116" font-family="Georgia, Microsoft YaHei, serif" font-size="42" font-weight="700" fill="#0F172A">Ready to sell into service teams.</text>
    <text x="56" y="152" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#475569">The product packages a daily outbound workflow agencies can adopt without changing their CRM.</text>
  </g>
  <g id="buyer-panel">
    <path fill="#0F172A" d="M74,206 H420 A18,18 0 0 1 438,224 V544 A18,18 0 0 1 420,562 H74 A18,18 0 0 1 56,544 V224 A18,18 0 0 1 74,206 Z" />
    <text x="86" y="252" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="15" font-weight="800" fill="#38BDF8">PRIMARY BUYER</text>
    <text font-size="34" fill="#FFFFFF" font-weight="700" font-family="Georgia, Microsoft YaHei, serif" x="86" y="306">B2B agencies</text><text font-size="34" fill="#FFFFFF" font-weight="700" font-family="Georgia, Microsoft YaHei, serif" x="86" y="348">and consultancies</text><text font-size="17" fill="#E2E8F0" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="86" y="402">They already sell expertise.</text><text font-size="17" fill="#E2E8F0" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="86" y="430">SignalScout tells them which</text><text font-size="17" fill="#E2E8F0" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="86" y="458">accounts have timely evidence</text><text font-size="17" fill="#E2E8F0" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" x="86" y="486">for a focused conversation.</text><path fill="#10B981" d="M104,492 H284 A18,18 0 0 1 302,510 V510 A18,18 0 0 1 284,528 H104 A18,18 0 0 1 86,510 V510 A18,18 0 0 1 104,492 Z" />
    <text x="194" y="516" text-anchor="middle" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">Clear first wedge</text>
  </g>
  <g id="readiness-list">
    <path fill="#FFFFFF" stroke="#E2E8F0" d="M504,206 H1206 A18,18 0 0 1 1224,224 V544 A18,18 0 0 1 1206,562 H504 A18,18 0 0 1 486,544 V224 A18,18 0 0 1 504,206 Z" />
    <line x1="542" y1="268" x2="542" y2="492" stroke="#E2E8F0" stroke-width="3" />
    <g id="ready-one">
      <circle cx="542" cy="268" r="24" fill="#10B981" />
      
  <g transform="translate(528.0, 254.0) scale(1.1666666666666667)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M4 6a8 3 0 1 0 16 0a8 3 0 1 0 -16 0" />
    <path d="M4 6v6a8 3 0 0 0 16 0v-6" />
    <path d="M4 12v6a8 3 0 0 0 16 0v-6" />
  </g>
      <text x="590" y="262" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0F172A">Runs on public data</text>
      <text x="590" y="290" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#475569">Job postings are observable, repeatable, and refreshed by the market itself.</text>
    </g>
    <g id="ready-two">
      <circle cx="542" cy="343" r="24" fill="#38BDF8" />
      
  <g transform="translate(528.0, 329.0) scale(1.1666666666666667)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M3 13a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v6a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -6" />
    <path d="M15 9a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -10" />
    <path d="M9 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v14a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -14" />
    <path d="M4 20h14" />
  </g>
      <text x="590" y="337" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0F172A">Produces a daily priority list</text>
      <text x="590" y="365" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#475569">The buyer receives ranked accounts with evidence instead of another raw lead table.</text>
    </g>
    <g id="ready-three">
      <circle cx="542" cy="418" r="24" fill="#0F172A" />
      
  <g transform="translate(528.0, 404.0) scale(1.1666666666666667)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M8 9h8" />
    <path d="M8 13h6" />
    <path d="M12 21l-1 -1l-2 -2h-3a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v6" />
    <path d="M15 19l2 2l4 -4" />
  </g>
      <text x="590" y="412" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0F172A">Creates usable sales artifacts</text>
      <text x="590" y="440" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#475569">Each lead comes with inferred pain, proof, and a grounded outreach draft.</text>
    </g>
    <g id="ready-four">
      <circle cx="542" cy="492" r="24" fill="#F59E0B" />
      
  <g transform="translate(528.0, 478.0) scale(1.1666666666666667)" fill="none" stroke="#FFFFFF" stroke-width="2">
    <path d="M10 14l11 -11" />
    <path d="M21 3l-6.5 18a.55 .55 0 0 1 -1 0l-3.5 -7l-7 -3.5a.55 .55 0 0 1 0 -1l18 -6.5" />
  </g>
      <text x="590" y="486" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="800" fill="#0F172A">Fits existing sales motion</text>
      <text x="590" y="514" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="15" fill="#475569">Slack digest and export paths make the workflow easy to pilot with a small team.</text>
    </g>
  </g>
  <g id="closing-line">
    <path fill="#FFFFFF" stroke="#E2E8F0" d="M246,610 H1034 A24,24 0 0 1 1058,634 V634 A24,24 0 0 1 1034,658 H246 A24,24 0 0 1 222,634 V634 A24,24 0 0 1 246,610 Z" />
    <text x="640" y="641" text-anchor="middle" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="17" font-weight="800" fill="#0F172A">SignalScout is not just a demo: it is a practical prospecting product with a clear buyer.</text>
  </g>
  <g id="footer">
    <text x="56" y="684" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#94A3B8">Commercial wedge: public data -&gt; daily sales priorities</text>
    <text x="1224" y="684" text-anchor="end" font-family="Arial, Microsoft YaHei, PingFang SC, sans-serif" font-size="12" font-weight="700" fill="#94A3B8">07 / 08</text>
  </g>
</svg>